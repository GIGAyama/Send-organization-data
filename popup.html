<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 280px; padding: 15px; font-family: sans-serif; }
    button { width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: bold; }
    button:hover:not(:disabled) { background: #1557b0; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #bulkTransferBtn { background: #34a853; margin-top: 10px; }
    #bulkTransferBtn:hover:not(:disabled) { background: #2b803f; }
    .note { font-size: 11px; color: #555; margin-top: 0; margin-bottom: 10px; line-height: 1.3; }
    #status { margin-top: 12px; font-size: 12px; color: #333; word-break: break-all; }
    hr { border: 0; border-top: 1px solid #ddd; margin: 15px 0; }
  </style>
</head>
<body>
  <h4 style="margin-top: 0;">個人アカウントへコピー</h4>
  
  <button id="transferBtn">開いているファイルを転送</button>
  <p class="note">現在開いているファイルを転送します（ドキュメント・PDF・画像等）</p>
  
  <hr>
  
  <button id="bulkTransferBtn">選択中のファイル一括転送</button>
  <p class="note">Googleドライブ画面で、ファイルを選択（青色反転）してから押してください</p>

  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
